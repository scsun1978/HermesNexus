<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务管理 - HermesNexus 控制台</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>HermesNexus 任务管理</h1>
            <div class="header-actions">
                <button class="btn btn-primary" onclick="showCreateModal()">+ 新增任务</button>
                <button class="btn btn-secondary" onclick="refreshTasks()">刷新</button>
            </div>
        </header>

        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">总任务数</div>
                <div class="stat-value" id="total-tasks">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">运行中</div>
                <div class="stat-value stat-primary" id="running-tasks">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">待处理</div>
                <div class="stat-value stat-warning" id="pending-tasks">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">成功率</div>
                <div class="stat-value stat-success" id="success-rate">-</div>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters">
            <div class="filter-group">
                <label>任务类型:</label>
                <select id="filter-type" onchange="filterTasks()">
                    <option value="">全部</option>
                    <option value="basic_exec">基础命令执行</option>
                    <option value="script_transfer">脚本传输</option>
                    <option value="file_transfer">文件传输</option>
                    <option value="system_info">系统信息</option>
                </select>
            </div>

            <div class="filter-group">
                <label>状态:</label>
                <select id="filter-status" onchange="filterTasks()">
                    <option value="">全部</option>
                    <option value="pending">待处理</option>
                    <option value="assigned">已分配</option>
                    <option value="running">运行中</option>
                    <option value="succeeded">成功</option>
                    <option value="failed">失败</option>
                    <option value="timeout">超时</option>
                    <option value="cancelled">已取消</option>
                </select>
            </div>

            <div class="filter-group">
                <label>优先级:</label>
                <select id="filter-priority" onchange="filterTasks()">
                    <option value="">全部</option>
                    <option value="urgent">紧急</option>
                    <option value="high">高</option>
                    <option value="normal">普通</option>
                    <option value="low">低</option>
                </select>
            </div>

            <div class="filter-group">
                <label>搜索:</label>
                <input type="text" id="filter-search" placeholder="名称、命令..." onkeyup="filterTasks()">
            </div>
        </div>

        <!-- Tasks Table -->
        <div class="table-container">
            <table class="table" id="tasks-table">
                <thead>
                    <tr>
                        <th>任务ID</th>
                        <th>名称</th>
                        <th>类型</th>
                        <th>状态</th>
                        <th>优先级</th>
                        <th>目标资产</th>
                        <th>目标节点</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tasks-tbody">
                    <tr>
                        <td colspan="9" class="text-center">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination">
            <button class="btn btn-sm" onclick="previousPage()" id="prev-btn">上一页</button>
            <span id="page-info">第 1 页</span>
            <button class="btn btn-sm" onclick="nextPage()" id="next-btn">下一页</button>
        </div>
    </div>

    <!-- Create/Edit Modal -->
    <div id="task-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">新增任务</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="task-form">
                    <input type="hidden" id="task-id">

                    <div class="form-group">
                        <label>任务名称 *</label>
                        <input type="text" id="task-name" required>
                    </div>

                    <div class="form-group">
                        <label>任务类型 *</label>
                        <select id="task-type" required>
                            <option value="">请选择</option>
                            <option value="basic_exec">基础命令执行</option>
                            <option value="script_transfer">脚本传输</option>
                            <option value="file_transfer">文件传输</option>
                            <option value="system_info">系统信息</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>优先级</label>
                        <select id="task-priority">
                            <option value="low">低</option>
                            <option value="normal" selected>普通</option>
                            <option value="high">高</option>
                            <option value="urgent">紧急</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>目标资产 *</label>
                        <input type="text" id="target-asset" required placeholder="asset-001">
                    </div>

                    <div class="form-group">
                        <label>命令 *</label>
                        <input type="text" id="task-command" required placeholder="uname -a">
                    </div>

                    <div class="form-group">
                        <label>命令参数</label>
                        <input type="text" id="task-arguments" placeholder="-a -b">
                        <small>多个参数用空格分隔</small>
                    </div>

                    <div class="form-group">
                        <label>工作目录</label>
                        <input type="text" id="task-workdir" placeholder="/home/user">
                    </div>

                    <div class="form-group">
                        <label>超时时间（秒）</label>
                        <input type="number" id="task-timeout" value="300" min="1" max="3600">
                    </div>

                    <div class="form-group">
                        <label>重试次数</label>
                        <input type="number" id="task-retry" value="0" min="0" max="5">
                    </div>

                    <div class="form-group">
                        <label>描述</label>
                        <textarea id="task-description" rows="3"></textarea>
                    </div>

                    <div class="form-group">
                        <label>标签</label>
                        <input type="text" id="task-tags" placeholder="production,critical">
                        <small>多个标签用逗号分隔</small>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">创建任务</button>
                        <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Task Detail Modal -->
    <div id="detail-modal" class="modal" style="display: none;">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2>任务详情</h2>
                <button class="close-btn" onclick="closeDetailModal()">&times;</button>
            </div>
            <div class="modal-body" id="detail-content">
                <!-- 详情内容将动态加载 -->
            </div>
        </div>
    </div>

    <!-- Task Result Modal -->
    <div id="result-modal" class="modal" style="display: none;">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2>任务执行结果</h2>
                <button class="close-btn" onclick="closeResultModal()">&times;</button>
            </div>
            <div class="modal-body" id="result-content">
                <!-- 结果内容将动态加载 -->
            </div>
        </div>
    </div>

    <script src="/static/js/tasks.js"></script>
</body>
</html>
